<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#00ff00">
    <title>CHIP-MONSTER PWA</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --neon: #0f0; --bg: #050505; --panel: #111; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; -webkit-user-select: none; user-select: none; }
        .panel { border: 3px solid var(--neon); padding: 15px; background: var(--panel); box-shadow: 0 0 20px rgba(0,255,0,0.2); max-width: 500px; width: 100%; box-sizing: border-box; }
        h1 { text-align: center; font-size: 1.2rem; margin: 0 0 10px 0; letter-spacing: 3px; background: var(--neon); color: #000; }
        .section { border: 1px solid #333; padding: 10px; margin-bottom: 10px; border-radius: 4px; }
        .section-title { font-size: 10px; color: #888; margin-bottom: 8px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .row { display: flex; flex-direction: column; gap: 2px; margin-bottom: 5px; }
        label { font-size: 10px; }
        input[type="range"] { accent-color: var(--neon); width: 100%; cursor: pointer; }
        select, button { background: #000; color: var(--neon); border: 1px solid var(--neon); padding: 8px; font-family: 'Courier New', monospace; cursor: pointer; }
        .drone-active { background: var(--neon) !important; color: #000 !important; box-shadow: 0 0 10px var(--neon); }
        .keyboard { display: flex; gap: 2px; justify-content: center; margin: 15px 0; height: 80px; }
        .key { flex: 1; border: 1px solid var(--neon); display: flex; align-items: flex-end; justify-content: center; padding-bottom: 5px; font-size: 9px; cursor: pointer; position: relative; }
        .key.black { background: #222; color: var(--neon); height: 60%; margin: 0 -8px; z-index: 1; min-width: 20px; }
        .key.active { background: #fff !important; color: #000; }
        .footer-controls { border-top: 2px solid var(--neon); padding-top: 10px; display: grid; grid-template-columns: 1fr 2fr; gap: 10px; align-items: center; }
    </style>
</head>
<body>
<div class="panel">
    <h1>CHIP-MONSTER v1</h1>
    <div class="grid">
        <div class="section">
            <div class="section-title">Osc / Env</div>
            <div class="row">
                <select id="waveform">
                    <option value="square">SQUARE</option>
                    <option value="triangle">TRIANGLE</option>
                    <option value="sawtooth">SAWTOOTH</option>
                </select>
            </div>
            <div class="row"><label>ATK</label><input type="range" id="attack" min="0.01" max="0.5" step="0.01" value="0.01"></div>
            <div class="row"><label>REL</label><input type="range" id="release" min="0.01" max="1.5" step="0.01" value="0.3"></div>
        </div>
        <div class="section">
            <div class="section-title">Distortion</div>
            <div class="row"><label>DRIVE</label><input type="range" id="distDrive" min="0" max="100" step="1" value="0"></div>
            <div class="row"><label>VOL</label><input type="range" id="distLevel" min="0" max="1" step="0.01" value="0.7"></div>
        </div>
    </div>
    <div class="grid">
        <div class="section">
            <div class="section-title">Delay</div>
            <div class="row"><label>TIME</label><input type="range" id="delayTime" min="0" max="1" step="0.01" value="0.3"></div>
            <div class="row"><label>FEEDBACK</label><input type="range" id="delayFb" min="0" max="0.9" step="0.01" value="0.4"></div>
        </div>
        <div class="section">
            <div class="section-title">Reverb</div>
            <div class="row"><label>SIZE</label><input type="range" id="revSize" min="0.01" max="3" step="0.1" value="1"></div>
            <div class="row"><label>MIX</label><input type="range" id="revMix" min="0" max="1" step="0.01" value="0.2"></div>
        </div>
    </div>
    <div class="keyboard" id="keyboard"></div>
    <div class="footer-controls">
        <button id="droneBtn" onclick="toggleDrone()">DRONE: OFF</button>
        <div class="row">
            <label>MASTER VOL</label>
            <input type="range" id="masterVol" min="0" max="1" step="0.01" value="0.5">
        </div>
    </div>
    <button style="width:100%; margin-top:10px; font-weight:bold;" onclick="randomize()">🎲 RANDOMIZE</button>
</div>
<script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const distortionNode = audioCtx.createWaveShaper();
    const delayNode = audioCtx.createDelay(2.0);
    const delayFeedback = audioCtx.createGain();
    const delayMix = audioCtx.createGain();
    const reverbNode = audioCtx.createConvolver();
    const reverbMix = audioCtx.createGain();
    const masterGain = audioCtx.createGain();
    const finalOut = audioCtx.createGain();

    function makeDistCurve(amount) {
        let n = 44100, curve = new Float32Array(n), deg = Math.PI / 180, x;
        for (let i = 0; i < n; ++i ) {
            x = i * 2 / n - 1;
            curve[i] = (3 + amount) * x * 20 * deg / (Math.PI + amount * Math.abs(x));
        }
        return curve;
    }

    function buildReverb() {
        const len = audioCtx.sampleRate * parseFloat(document.getElementById('revSize').value);
        const buf = audioCtx.createBuffer(2, len, audioCtx.sampleRate);
        for(let c=0; c<2; c++) {
            let data = buf.getChannelData(c);
            for(let i=0; i<len; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/len, 3);
        }
        reverbNode.buffer = buf;
    }
    buildReverb();

    masterGain.connect(distortionNode);
    distortionNode.connect(finalOut);
    distortionNode.connect(delayNode);
    delayNode.connect(delayFeedback);
    delayFeedback.connect(delayNode);
    delayNode.connect(delayMix);
    delayMix.connect(finalOut);
    distortionNode.connect(reverbNode);
    reverbNode.connect(reverbMix);
    reverbMix.connect(finalOut);
    finalOut.connect(audioCtx.destination);

    const activeOscs = {};
    let isDrone = false;
    const NOTES = {'a':261.63, 'w':277.18, 's':293.66, 'e':311.13, 'd':329.63, 'f':349.23, 't':369.99, 'g':392.00, 'y':415.30, 'h':440.00, 'u':466.16, 'j':523.25};
    const kb = document.getElementById('keyboard');
    Object.keys(NOTES).forEach(k => {
        const isBlack = "wetyu".includes(k);
        const d = document.createElement('div');
        d.className = `key ${isBlack ? 'black' : ''}`;
        d.id = `key-${k}`;
        d.innerHTML = k.toUpperCase();
        d.onmousedown = (e) => { e.preventDefault(); playNote(k); };
        d.onmouseup = () => !isDrone && stopNote(k);
        d.ontouchstart = (e) => { e.preventDefault(); playNote(k); };
        d.ontouchend = () => !isDrone && stopNote(k);
        kb.appendChild(d);
    });

    function toggleDrone() {
        isDrone = !isDrone;
        const btn = document.getElementById('droneBtn');
        btn.innerText = isDrone ? "DRONE: ON" : "DRONE: OFF";
        btn.className = isDrone ? "drone-active" : "";
        if(!isDrone) Object.keys(activeOscs).forEach(k => stopNote(k));
    }

    function playNote(k) {
        if (activeOscs[k]) { if(isDrone) stopNote(k); return; }
        if (audioCtx.state === 'suspended') audioCtx.resume();
        distortionNode.curve = makeDistCurve(parseFloat(document.getElementById('distDrive').value));
        delayNode.delayTime.value = parseFloat(document.getElementById('delayTime').value);
        delayFeedback.gain.value = parseFloat(document.getElementById('delayFb').value);
        delayMix.gain.value = 0.4;
        reverbMix.gain.value = parseFloat(document.getElementById('revMix').value);
        finalOut.gain.value = parseFloat(document.getElementById('masterVol').value);

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = document.getElementById('waveform').value;
        osc.frequency.value = NOTES[k];
        const atk = parseFloat(document.getElementById('attack').value);
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + atk);
        osc.connect(gain);
        gain.connect(masterGain);
        osc.start();
        activeOscs[k] = { osc, gain };
        document.getElementById(`key-${k}`).classList.add('active');
    }

    function stopNote(k) {
        if (!activeOscs[k]) return;
        const { osc, gain } = activeOscs[k];
        const rel = parseFloat(document.getElementById('release').value);
        gain.gain.cancelScheduledValues(audioCtx.currentTime);
        gain.gain.setValueAtTime(gain.gain.value, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + rel);
        osc.stop(audioCtx.currentTime + rel);
        delete activeOscs[k];
        document.getElementById(`key-${k}`).classList.remove('active');
    }

    function randomize() {
        document.getElementById('distDrive').value = Math.random() * 100;
        document.getElementById('delayTime').value = Math.random() * 0.5;
        document.getElementById('delayFb').value = Math.random() * 0.7;
        document.getElementById('revMix').value = Math.random() * 0.5;
        document.getElementById('release').value = 0.1 + Math.random() * 1.0;
        buildReverb();
    }
    document.getElementById('revSize').onchange = buildReverb;
    window.onkeydown = e => NOTES[e.key.toLowerCase()] && playNote(e.key.toLowerCase());
    window.onkeyup = e => !isDrone && NOTES[e.key.toLowerCase()] && stopNote(e.key.toLowerCase());
</script>
</body>
</html>
